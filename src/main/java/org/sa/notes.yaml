  swim:
    - source: faction mat faction ability available from game start
    - effect: workers may move across rivers as normal movement (treat river borders as passable edges for workers only)
    - effect_explicit_meaning:
        - workers may cross river borders directly between adjacent land territories
        - workers do NOT enter rivers or occupy river spaces
        - workers simply ignore river restriction when moving between tiles
    - effect_applies_to:
        - workers
    - no_effect_for:
        - character
        - mechs
    - access_from_faction_mat: NORDIC_BLUE
