        - TOGAWA_PURPLE

factory_card:
  - source: game map Factory structure (center tiles)
  - how_to_obtain:
      - move a character or mech onto a Factory tile
      - that player immediately gains control of the Factory
      - only the FIRST player to enter a specific Factory gains its card
      - control is permanent for that player (unless house rules or special effects change it, which normally do not exist)
  - trigger_on_acquisition:
      - immediately take the Factory card corresponding to the number of players
      - draw 1 Factory card and choose 1 of its two reward rows (top OR bottom)
      - place chosen reward into your player mat (replacing an upgrade slot or action enhancement depending on rules version)
  - effect_access:
      - Factory card bottom row includes special actions such as Factory Move Action
      - Factory card top row usually provides powerful one-time or ongoing benefits depending on chosen option
  - important_rule:
      - each Factory tile can only be claimed once per game
      - multiple players cannot gain the same Factory card



